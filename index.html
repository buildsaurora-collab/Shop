<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="product-grid" class="container"></div>

    <script>
        const productFolders = ['product-1', 'product-2'];
        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            for (const folder of productFolders) {
                // Fetches data.json from inside each specific product folder
                const response = await fetch(`products/${folder}/data.json`);
                const data = await response.json();
                
                grid.innerHTML += `
                    <div class="card">
                        <h3>${data.name}</h3>
                        <p>Price: ${data.price}</p>
                        <a href="payments.html" class="btn">Buy Now</a>
                    </div>
                `;
            }
        }
        loadProducts();
    </script>
</body>
</html>
